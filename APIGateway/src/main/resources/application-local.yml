# Local Development Configuration (Demo Values)
# Copy to application-local.yml and customize

spring:
  application:
    name: API Gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/demo-realm
          jwk-set-uri: http://localhost:8081/realms/demo-realm/protocol/openid-connect/certs
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/v1/user/**
              filters:
                - RewritePath=/api/v1/user/(?<segment>.*), /api/v1/$\{segment}
            - id: meme-service
              uri: lb://meme-service
              predicates:
                - Path=/api/v1/meme/**
              filters:
                - RewritePath=/api/v1/meme/(?<segment>.*), /api/v1/$\{segment}

server:
  port: 8080

eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:8761/eureka/

user:
  username: admin
  password: admin
  role: SUPERADMIN

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.cloud.gateway: DEBUG
