spring:
  application:
    name: FileStorageService
  datasource:
    url: jdbc:postgresql://localhost:7075/filestorage
    username: admin
    password: admin
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/MemeVerse
          jwk-set-uri: http://localhost:8080/realms/MemeVerse/protocol/openid-connect/certs
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8083

# Eureka Configuration
eureka:
  client:
    service-url:
      defaultZone: http://admin:admin@localhost:8080/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

# MinIO Configuration
minio:
  endpoint: http://localhost:9000
  access-key: root
  secret-key: key

# File Storage Configuration
storage:
  buckets:
    users: memeverse-users
    memes: memeverse-memes
    default: memeverse-files
  allowed-types:
    users:
      - image/jpeg
      - image/png
      - image/gif
      - image/webp
    memes:
      - image/jpeg
      - image/png
      - image/gif
      - image/webp
      - video/mp4
      - video/webm
  max-sizes:
    users: 5
    memes: 20
  presigned-url-expiry: 15
