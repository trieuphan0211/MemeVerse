spring:
  application:
    name: MemeService
  datasource:
    url: jdbc:postgresql://localhost:7074/memes
    username: admin
    password: admin
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://sso.stephen.io.vn/realms/MemeVerse
          jwk-set-uri: https://sso.stephen.io.vn/realms/MemeVerse/protocol/openid-connect/certs
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8082

# Eureka Configuration
eureka:
  client:
    service-url:
      defaultZone: http://admin:admin@localhost:8080/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

# MinIO Configuration
minio:
  endpoint: http://localhost:9000
  access-key: root
  secret-key: Trieuphan@0372106260
  bucket-name: memes
