version: "3"
services:
  # DATABASE
  # Database for Keycloak
  keycloakdb:
    image: postgres:15
    ports:
      - "7070:5432"
    restart: unless-stopped
    networks:
      - web-network
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - ./keycloak_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
  # Document database:
  document_db:
    image: postgres:15
    ports:
      - "7072:5432"
    environment:
      POSTGRES_DB: documents
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
      - ./documents_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5
  # SERVICE
  nginx-proxy:
    container_name: nginx-proxy
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - web-network
      - s3-network
  api-gateway:
    build: ./APIGateway
    image: api-gateway
    container_name: gateway
    volumes:
      - ./APIGateway/build/libs/APIGateway-1.0.0.jar:/app/APIGateway.jar
    networks:
      - web-network
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    command:
      - start
      - --http-enabled=true
      - --hostname=https://sso.stephen.io.vn
      - --proxy-headers=xforwarded
      - --http-relative-path=/
      - --hostname-backchannel-dynamic=true
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloakdb:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: admin          # Account login admin role
      KEYCLOAK_ADMIN_PASSWORD: admin # Password admin
        #KC_HOSTNAME: sso.stephen.io.vn
        #KC_HTTP_ENABLED: "true"
        #KC_PROXY_HEADERS: xforwarded
        #KC_HOSTNAME_STRICT: "false"
        #KC_HTTP_STRICT_HTTPS: "false"
        #KC_HOSTNAME: "sso.stephen.io.vn"
        #KC_HOSTNAME_URL: "https://sso.stephen.io.vn"
      #KC_HOSTNAME_ADMIN_URL: "https://sso.stephen.io.vn"
#    ports:
#      - "8080:8080"
    networks:
      - web-network
    depends_on:
      keycloakdb:
        condition: service_healthy
  minio:
    image: quay.io/minio/minio
    container_name: minio
    restart: unless-stopped
    volumes:
      - ./minio_data:/data
    environment:
      MINIO_ROOT_USER: "root"
      MINIO_ROOT_PASSWORD: "Trieuphan@0372106260"
      MINIO_BROWSER_REDIRECT_URL: "https://s3-console.stephen.io.vn" # URL của console
      MINIO_SERVER_URL: "https://s3.stephen.io.vn" # URL của API S3
    command: server /data --console-address ":9001"
    networks:
      - s3-network
networks:
  web-network:
    driver: bridge
  s3-network:
    driver: bridge